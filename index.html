<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choomar's Typing Game</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-200">

  <div id="root"></div>

  <!-- React JSX Application Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Firebase Mock Fallback in case configs are absent so that the code remains fully playable
    const appId = "typoracer-default";
    
    const DEFAULT_PFP = "https://files.catbox.moe/8en0p4.jpg";
    const STATIC_TEXT = "They combined with the power of the dog and then the slush went inside the house onto the portion.";

    // Level Racing opponent presets
    const BOT_PRESETS = [
      { id: 'bot_sharko', name: 'Baby Sharko', wpm: 15, avatar: 'https://files.catbox.moe/4o6ky1.jpg', color: 'bg-blue-500' },
      { id: 'bot_elmo', name: 'Elmo', wpm: 25, avatar: 'https://files.catbox.moe/c7lw1x.jpg', color: 'bg-red-500' }
    ];

    // Synthetic audio feedback
    const playSound = (type) => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'keypress') {
          osc.frequency.setValueAtTime(600, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'error') {
          osc.frequency.setValueAtTime(140, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'victory') {
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, idx) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.1);
            g.gain.setValueAtTime(0.08, audioCtx.currentTime + idx * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + idx * 0.1 + 0.35);
            o.start(audioCtx.currentTime + idx * 0.1);
            o.stop(audioCtx.currentTime + idx * 0.1 + 0.35);
          });
        } else if (type === 'countdown') {
          osc.frequency.setValueAtTime(400, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'go') {
          osc.frequency.setValueAtTime(800, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        }
      } catch (e) {
        // Suppress browser autoplay limits
      }
    };

    function App() {
      const [username, setUsername] = useState('Guest');
      const [userIcon, setUserIcon] = useState(DEFAULT_PFP);
      const [view, setView] = useState('home'); // home, lobby, race, results
      const [raceMode, setRaceMode] = useState(null); // 'public' or 'level'
      
      // Typing mechanics
      const [targetText, setTargetText] = useState(STATIC_TEXT);
      const [typedInput, setTypedInput] = useState('');
      const [currentError, setCurrentError] = useState(false);
      const [startTime, setStartTime] = useState(null);
      const [endTime, setEndTime] = useState(null);
      const [elapsedTime, setElapsedTime] = useState(0);
      const [accuracy, setAccuracy] = useState(100);
      const [wpm, setWpm] = useState(0);
      const [errorCount, setErrorCount] = useState(0);
      const [isFinished, setIsFinished] = useState(false);
      
      // Single-player configs
      const [selectedBot, setSelectedBot] = useState(BOT_PRESETS[0]);
      const [botProgress, setBotProgress] = useState(0);
      const [botFinished, setBotFinished] = useState(false);
      const [botFinishedTime, setBotFinishedTime] = useState(null);
      
      // Local simulated Lobby states for static fallback build
      const [currentLobbyId, setCurrentLobbyId] = useState(null);
      const [countdown, setCountdown] = useState(null);
      const [playersList, setPlayersList] = useState([]);
      const [copied, setCopied] = useState(false);
      
      const inputRef = useRef(null);
      const fileInputRef = useRef(null);
      const timerRef = useRef(null);
      const botIntervalRef = useRef(null);
      const lobbyBotTimerRef = useRef(null);

      // --- INITIAL PROFILE LOADING ---
      useEffect(() => {
        const storedName = localStorage.getItem('typoracer_username') || 'Guest';
        const storedIcon = localStorage.getItem('typoracer_icon') || DEFAULT_PFP;
        setUsername(storedName);
        setUserIcon(storedIcon);
        
        // Listen for direct joins from link queries
        const params = new URLSearchParams(window.location.search);
        const lobbyParam = params.get('lobby');
        if (lobbyParam) {
          const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
          window.history.pushState({ path: newUrl }, '', newUrl);
          joinSpecificLobby(lobbyParam);
        }
      }, []);

      const saveProfile = (newUsername, newIcon) => {
        setUsername(newUsername);
        setUserIcon(newIcon);
        localStorage.setItem('typoracer_username', newUsername);
        localStorage.setItem('typoracer_icon', newIcon);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) {
          alert("Please select a valid image file.");
          return;
        }
        if (file.size > 2 * 1024 * 1024) {
          alert("File size must be under 2MB.");
          return;
        }

        const reader = new FileReader();
        reader.onloadend = () => {
          saveProfile(username, reader.result);
        };
        reader.readAsDataURL(file);
      };

      const resetToDefaultImage = () => {
        saveProfile(username, DEFAULT_PFP);
      };

      // --- RUNNING STATS CALCULATOR ---
      useEffect(() => {
        if (startTime && !isFinished && view === 'race' && countdown === null) {
          timerRef.current = setInterval(() => {
            const now = Date.now();
            const durationSec = (now - startTime) / 1000;
            setElapsedTime(durationSec);

            let correctCharsCount = 0;
            for (let i = 0; i < typedInput.length; i++) {
              if (typedInput[i] === targetText[i]) {
                correctCharsCount++;
              }
            }
            const currentWpm = durationSec > 0 ? Math.round((correctCharsCount / 5) / (durationSec / 60)) : 0;
            setWpm(currentWpm);
            
            // Sync current user's profile on public local multiplayer pool
            if (raceMode === 'public') {
              setPlayersList(prev => prev.map(p => {
                if (p.uid === 'user_main') {
                  return { ...p, progress: Math.min(100, Math.round((correctCharsCount / targetText.length) * 100)), wpm: currentWpm };
                }
                return p;
              }));
            }
          }, 250);
        } else {
          clearInterval(timerRef.current);
        }

        return () => clearInterval(timerRef.current);
      }, [startTime, isFinished, typedInput, targetText, view, raceMode, countdown]);

      // --- SOLO LEVEL BOT PROGRESSION TRACK ---
      useEffect(() => {
        if (raceMode === 'level' && startTime && (view === 'race' || view === 'results') && countdown === null) {
          const charsPerSec = (selectedBot.wpm * 5) / 60;
          const intervalMs = 200;
          
          botIntervalRef.current = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            const totalCharsTyped = elapsed * charsPerSec;
            const percent = Math.min(100, Math.round((totalCharsTyped / targetText.length) * 100));
            
            setBotProgress(percent);
            
            if (percent >= 100 && !botFinished) {
              setBotFinished(true);
              setBotFinishedTime(elapsed);
            }
          }, intervalMs);
        } else {
          clearInterval(botIntervalRef.current);
        }
        return () => clearInterval(botIntervalRef.current);
      }, [startTime, selectedBot, targetText, raceMode, view, botFinished, countdown]);

      // --- PUBLIC RACE MULTIPLAYER BOT DRIVER ---
      useEffect(() => {
        if (raceMode === 'public' && startTime && (view === 'race' || view === 'results') && countdown === null) {
          const botRunners = playersList.filter(p => p.isBot);
          if (botRunners.length === 0) return;

          const runnerInterval = setInterval(() => {
            setPlayersList(prev => prev.map(player => {
              if (player.isBot && !player.finished) {
                const elapsed = (Date.now() - startTime) / 1000;
                const charsPerSec = (player.botWpm * 5) / 60;
                const botProgressChars = elapsed * charsPerSec;
                const progressPercent = Math.min(100, Math.round((botProgressChars / targetText.length) * 100));
                const completed = progressPercent >= 100;
                
                return {
                  ...player,
                  progress: progressPercent,
                  finished: completed,
                  time: completed ? elapsed : 0
                };
              }
              return player;
            }));
          }, 1000);

          return () => clearInterval(runnerInterval);
        }
      }, [startTime, raceMode, view, playersList, countdown]);

      // --- PUBLIC LOBBY MANAGEMENT ---
      const joinSpecificLobby = (lobbyId) => {
        setView('lobby');
        setRaceMode('public');
        setCurrentLobbyId(lobbyId);
        
        const mainPlayer = { uid: 'user_main', name: username, icon: userIcon, progress: 0, wpm: 0, accuracy: 100, finished: false, time: 0 };
        setPlayersList([mainPlayer]);
      };

      const joinPublicRace = () => {
        setRaceMode('public');
        setView('lobby');
        const lobbyId = `lobby_${Math.floor(100000 + Math.random() * 900000)}`;
        setCurrentLobbyId(lobbyId);
        
        const mainPlayer = { uid: 'user_main', name: username, icon: userIcon, progress: 0, wpm: 0, accuracy: 100, finished: false, time: 0 };
        setPlayersList([mainPlayer]);
      };

      // --- INJECT BOTS RAPIDLY EVERY 1111ms UNTIL LOBBY REACHES 4 CAPACITY ---
      useEffect(() => {
        if (view !== 'lobby' || raceMode !== 'public') return;

        lobbyBotTimerRef.current = setInterval(() => {
          if (playersList.length >= 4) {
            clearInterval(lobbyBotTimerRef.current);
            // Trigger 10 second countdown once we are at 4/4 lobby capacity
            startPublicCountdown();
            return;
          }

          const currentBotNums = playersList
            .filter(p => p.isBot)
            .map(p => parseInt(p.name.split(' ')[1], 10));

          const allPossibleNums = [1, 2, 3, 4, 5];
          const availableNums = allPossibleNums.filter(n => !currentBotNums.includes(n));

          if (availableNums.length > 0) {
            const randomNum = availableNums[Math.floor(Math.random() * availableNums.length)];
            const botWpms = { 1: 20, 2: 30, 3: 40, 4: 50, 5: 60 };
            const chosenBot = {
              uid: `bot_public_${randomNum}`,
              name: `Bot ${randomNum}`,
              icon: DEFAULT_PFP,
              progress: 0,
              wpm: botWpms[randomNum],
              accuracy: 100,
              finished: false,
              time: 0,
              isBot: true,
              botWpm: botWpms[randomNum]
            };

            setPlayersList(prev => [...prev, chosenBot]);
          }
        }, 1111);

        return () => clearInterval(lobbyBotTimerRef.current);
      }, [view, raceMode, playersList]);

      const startPublicCountdown = () => {
        let lobbyCountdown = 10;
        setCountdown(lobbyCountdown);
        playSound('countdown');

        const cdTimer = setInterval(() => {
          lobbyCountdown--;
          if (lobbyCountdown > 0) {
            setCountdown(lobbyCountdown);
            playSound('countdown');
          } else {
            clearInterval(cdTimer);
            setCountdown(null);
            playSound('go');
            setStartTime(Date.now());
            setView('race');
            setTimeout(() => {
              if (inputRef.current) inputRef.current.focus();
            }, 50);
          }
        }, 1000);
      };

      const startLocalLevelRace = (bot) => {
        setRaceMode('level');
        setSelectedBot(bot);
        setView('race');
        setTypedInput('');
        setCurrentError(false);
        setIsFinished(false);
        setErrorCount(0);
        setWpm(0);
        setAccuracy(100);
        setElapsedTime(0);
        setBotProgress(0);
        setBotFinished(false);
        setBotFinishedTime(null);
        setStartTime(null);

        let localCount = 3;
        setCountdown(localCount);
        playSound('countdown');

        const localTimer = setInterval(() => {
          localCount--;
          if (localCount > 0) {
            setCountdown(localCount);
            playSound('countdown');
          } else {
            clearInterval(localTimer);
            setCountdown(null);
            playSound('go');
            setStartTime(Date.now());
            setTimeout(() => {
              if (inputRef.current) inputRef.current.focus();
            }, 50);
          }
        }, 1000);
      };

      // --- INTERACTIVE KEY INPUT SYSTEM ---
      const handleInputChange = (e) => {
        if (countdown !== null) return;
        const inputVal = e.target.value;

        if (inputVal.length <= typedInput.length) {
          return;
        }

        const typedChar = inputVal[inputVal.length - 1];
        const expectedChar = targetText[typedInput.length];

        if (typedChar === expectedChar) {
          const nextInput = typedInput + typedChar;
          setTypedInput(nextInput);
          setCurrentError(false);
          playSound('keypress');

          const totalAttempts = nextInput.length + errorCount;
          const correctPercent = totalAttempts > 0 
            ? Math.round((nextInput.length / totalAttempts) * 100) 
            : 100;
          setAccuracy(correctPercent);

          if (nextInput === targetText) {
            const finishTime = Date.now();
            const finalSec = (finishTime - startTime) / 1000;
            setIsFinished(true);
            setEndTime(finishTime);
            setElapsedTime(finalSec);
            playSound('victory');

            const finalWpm = Math.round((targetText.length / 5) / (finalSec / 60));
            setWpm(finalWpm);

            if (raceMode === 'public') {
              setPlayersList(prev => prev.map(p => {
                if (p.uid === 'user_main') {
                  return { ...p, finished: true, time: finalSec, wpm: finalWpm, progress: 100 };
                }
                return p;
              }));
            }
            setView('results');
          }
        } else {
          setCurrentError(true);
          setErrorCount(prev => prev + 1);
          playSound('error');

          const totalAttempts = typedInput.length + errorCount + 1;
          const correctPercent = Math.round((typedInput.length / totalAttempts) * 100);
          setAccuracy(correctPercent);
        }
      };

      const handleCopyInvite = () => {
        const inviteUrl = `${window.location.origin}${window.location.pathname}?lobby=${currentLobbyId}`;
        const tempTextArea = document.createElement('textarea');
        tempTextArea.value = inviteUrl;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error("Failed to copy link", err);
        }
        document.body.removeChild(tempTextArea);
      };

      const leaveLobbyOrGame = () => {
        setView('home');
        setCurrentLobbyId(null);
        setPlayersList([]);
        setTypedInput('');
        setCurrentError(false);
      };

      const renderTargetText = () => {
        return targetText.split('').map((char, index) => {
          let charClass = "text-slate-400 dark:text-slate-500 font-mono text-xl md:text-2xl transition duration-150";
          let isCurrent = index === typedInput.length;

          if (index < typedInput.length) {
            charClass = "text-emerald-500 font-bold font-mono text-xl md:text-2xl border-b-2 border-emerald-400";
          } else if (isCurrent) {
            if (currentError) {
              charClass = "text-red-500 bg-red-100 dark:bg-red-900/40 font-bold font-mono text-xl md:text-2xl border-b-2 border-red-500 animate-pulse px-0.5";
            } else {
              charClass = "bg-indigo-100 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 border-b-2 border-indigo-600 animate-pulse px-0.5";
            }
          }

          return (
            <span key={index} className={charClass}>
              {char}
            </span>
          );
        });
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-200 py-10">
          
          {/* VIEW: HOME PAGE */}
          {view === 'home' && (
            <main className="max-w-4xl mx-auto px-6">
              <div className="text-center mb-10">
                <h2 className="text-4xl md:text-5xl font-extrabold mt-4 tracking-tight leading-tight">
                  Choomar's Typing Game
                </h2>
                <p className="text-indigo-600 dark:text-indigo-400 font-black tracking-widest uppercase mt-2 text-lg">
                  ALL HAIL
                </p>
              </div>

              {/* Username Custom Credentials Panel */}
              <div className="bg-white dark:bg-slate-950 p-6 rounded-3xl border border-slate-200/80 dark:border-slate-800/80 shadow-md mb-8 max-w-xl mx-auto">
                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-4">
                  Driver Credentials
                </h3>
                
                <div className="flex flex-col sm:flex-row gap-6 items-center">
                  <div className="flex flex-col items-center gap-2 shrink-0">
                    <div className="relative group">
                      <img 
                        src={userIcon} 
                        alt="Racer Profile" 
                        className="w-24 h-24 rounded-full object-cover border-4 border-indigo-500/30 shadow-md"
                        onError={(e) => { e.target.src = DEFAULT_PFP; }}
                      />
                      <button 
                        onClick={() => fileInputRef.current && fileInputRef.current.click()}
                        className="absolute inset-0 bg-black/60 text-white text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-150 rounded-full flex flex-col items-center justify-center gap-1 cursor-pointer"
                      >
                        <span>Upload Image</span>
                      </button>
                    </div>
                    
                    <input 
                      type="file" 
                      ref={fileInputRef} 
                      onChange={handleImageUpload} 
                      accept="image/*" 
                      className="hidden" 
                    />

                    <div className="flex gap-2">
                      <button 
                        onClick={() => fileInputRef.current && fileInputRef.current.click()}
                        className="text-[10px] bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 font-bold px-2 py-1 rounded"
                      >
                        Upload PFP
                      </button>
                      {userIcon !== DEFAULT_PFP && (
                        <button 
                          onClick={resetToDefaultImage}
                          className="text-[10px] text-red-500 bg-red-50 dark:bg-red-950/20 hover:bg-red-100 dark:hover:bg-red-900/30 font-bold px-2 py-1 rounded"
                        >
                          Reset
                        </button>
                      )}
                    </div>
                  </div>

                  <div className="flex-1 w-full">
                    <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Username</label>
                    <input
                      type="text"
                      maxLength={16}
                      value={username}
                      onChange={(e) => saveProfile(e.target.value || 'Guest', userIcon)}
                      placeholder="Enter username..."
                      className="w-full bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 border border-slate-200 dark:border-slate-800 rounded-2xl px-4 py-3 text-base font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150"
                    />
                  </div>
                </div>
              </div>

              {/* GAME MODES ACTIONS */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
                <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden flex flex-col justify-between group transform hover:-translate-y-0.5 transition-all duration-300">
                  <div>
                    <div className="flex justify-between items-start mb-3">
                      <span className="px-2.5 py-0.5 bg-indigo-400/30 backdrop-blur-md rounded-full text-[10px] font-semibold uppercase tracking-wider">
                        Matchmaking Lobby
                      </span>
                    </div>
                    <h3 className="text-2xl font-extrabold tracking-tight">Public Racing</h3>
                    <p className="text-indigo-100/80 mt-1 text-xs leading-relaxed max-w-xs">
                      Join a matchmaking queue to type and compete in real-time alongside other typing champions.
                    </p>
                  </div>
                  <button
                    onClick={joinPublicRace}
                    className="mt-6 bg-white hover:bg-indigo-50 text-indigo-700 font-extrabold py-3 px-5 rounded-2xl shadow text-sm flex items-center justify-center gap-2 transform active:scale-95 transition-all duration-150"
                  >
                    <span>Public Racing</span>
                  </button>
                </div>

                <div className="bg-white dark:bg-slate-950 rounded-3xl p-6 border border-slate-200/80 dark:border-slate-800/80 shadow-md relative overflow-hidden flex flex-col justify-between group transform hover:-translate-y-0.5 transition-all duration-300">
                  <div>
                    <div className="flex justify-between items-start mb-3">
                      <span className="px-2.5 py-0.5 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900 text-emerald-600 dark:text-emerald-400 rounded-full text-[10px] font-semibold uppercase tracking-wider">
                        Single Player
                      </span>
                    </div>
                    <h3 className="text-2xl font-extrabold tracking-tight text-slate-800 dark:text-white">Level Racing</h3>
                    <p className="text-slate-500 dark:text-slate-400 mt-1 text-xs leading-relaxed max-w-xs">
                      Select the bot you want to race with.
                    </p>
                    
                    <div className="mt-4 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        {BOT_PRESETS.map((bot) => (
                          <button
                            key={bot.id}
                            onClick={() => setSelectedBot(bot)}
                            className={`p-2 rounded-xl text-left border text-xs font-semibold transition-all duration-150 flex items-center gap-2 ${
                              selectedBot.id === bot.id
                                ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-700 dark:text-indigo-300 font-bold'
                                : 'border-slate-100 dark:border-slate-900 hover:border-slate-200 dark:hover:border-slate-800 text-slate-600 dark:text-slate-400'
                            }`}
                          >
                            <img 
                              src={bot.avatar} 
                              alt={bot.name} 
                              className="w-7 h-7 rounded-full object-cover border border-slate-300 dark:border-slate-700" 
                            />
                            <div className="truncate flex-1">
                              <span className="block truncate text-[10px] font-bold">{bot.name}</span>
                              <span className="text-[9px] font-mono text-slate-400">{bot.wpm} WPM</span>
                            </div>
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                  <button
                    onClick={() => startLocalLevelRace(selectedBot)}
                    className="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 px-5 rounded-2xl shadow text-sm flex items-center justify-center gap-2 transform active:scale-95 transition-all duration-150"
                  >
                    <span>Level Racing</span>
                  </button>
                </div>
              </div>
            </main>
          )}

          {/* VIEW: MULTIPLAYER LOBBY */}
          {view === 'lobby' && (

          {/* FOOTER */}
          <footer className="text-center py-6 text-[10px] text-slate-400 dark:text-slate-500 mt-10">
            <p>© Choomar's Typing Game. Realtime typing speed calculated using the standard (correct characters / 5) / elapsed minutes equation.</p>
          </footer>

        </div>
      );
    }

    // Render the App component into the HTML DOM root element
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
